<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>急救知识指南</title>
  <meta name="description" content="家庭与户外常见场景的应急处理与判断流程，关键时刻能救场。">
  <meta name="theme-color" content="#c0392b">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4.13.0/lib/themes/vue.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.css">

  <style>
    :root {
      --theme-color: #c0392b;
      --theme-color-dark: #922b21;
      --theme-color-light: #f5b7b1;
      --sidebar-width: 280px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif; }
    .markdown-section h1 { color: var(--theme-color); border-bottom: 2px solid var(--theme-color-light); padding-bottom: .3em; }
    .markdown-section h2 { color: var(--theme-color-dark); }
    .markdown-section h3 { color: var(--theme-color-dark); }
    .markdown-section blockquote { border-left: 4px solid var(--theme-color); background: #fdf2ef; }
    .sidebar { background: #fafafa; }
    .sidebar ul li.active > a { color: var(--theme-color); border-left: 3px solid var(--theme-color); background: #fdf2ef; }
    .app-name-link img { display: none; }
    .app-name-link { color: var(--theme-color) !important; }
    .markdown-section a { color: var(--theme-color-dark); }
    .markdown-section a:hover { color: var(--theme-color); }
    .pagination-item-label { color: var(--theme-color-dark); }
    .pagination-item:hover { border-color: var(--theme-color); }
    code, pre { font-family: "JetBrains Mono", Consolas, Monaco, monospace; }
    .markdown-section table { display: table; width: 100%; }
    .markdown-section table tr:nth-child(2n) { background: #fdf2ef; }
    .markdown-section p.tip { background: #fff5ee; border-left-color: var(--theme-color); }
  </style>
</head>
<body>
  <div id="app">加载中…</div>

  <script>
    window.$docsify = {
      name: '急救知识指南',
      repo: 'https://github.com/zhangwei89/First-Aid-Knowledge-Guide',
      loadSidebar: true,
      loadNavbar: true,
      coverpage: false,
      auto2top: true,
      subMaxLevel: 2,
      maxLevel: 4,
      search: {
        placeholder: '搜索书名、章节、内容',
        noData: '没有找到结果',
        paths: 'auto',
        depth: 6
      },
      pagination: {
        previousText: '上一章',
        nextText: '下一章',
        crossChapter: true
      },
      copyCode: {
        buttonText: '复制',
        errorText: '复制失败',
        successText: '已复制'
      }
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.0/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.0/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2.10.1/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@3.0.3/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-markdown.min.js"></script>
</body>
</html>
